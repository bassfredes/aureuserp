name: Pest Tests

# Temporary manual-CI mode (Intelligent Integration Suite 0.x budget freeze).
# Automatic triggers (push, pull_request, merge_group) are intentionally removed;
# ordinary validation happens locally via the monorepo "make verify-local" gate.
# This runs only on explicit manual dispatch, once per release candidate.
# Restore automatic triggers before v1.0.0.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend_assets:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    name: Frontend Assets Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node.js Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SCSS and Vite assets
        run: pnpm run build

      - name: Upload built plugin assets
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dist-assets
          path: plugins/webkul/*/resources/dist
          retention-days: 1

  pest_tests:
    needs: frontend_assets
    runs-on: ${{ matrix.operating-systems }}
    timeout-minutes: 45

    strategy:
      matrix:
        operating-systems: [ubuntu-latest]
        php-versions: ['8.4']

    name: PHP ${{ matrix.php-versions }} test on ${{ matrix.operating-systems }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aureuserp
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2

      - name: Setting Environment
        shell: bash
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(DB_CONNECTION=\s*\).*$|\1mysql|" .env
          sed -i "s|^#\?\s*DB_HOST=.*|DB_HOST=127.0.0.1|" .env
          sed -i "s|^#\?\s*DB_PORT=.*|DB_PORT=${{ job.services.mysql.ports['3306'] }}|" .env
          sed -i "s|^#\?\s*DB_DATABASE=.*|DB_DATABASE=aureuserp|" .env
          sed -i "s|^#\?\s*DB_USERNAME=.*|DB_USERNAME=root|" .env
          sed -i "s|^#\?\s*DB_PASSWORD=.*|DB_PASSWORD=root|" .env
          app_key="base64:$(php -r 'echo base64_encode(random_bytes(32));')"
          sed -i "s|^APP_KEY=.*|APP_KEY=${app_key}|" .env
          # Allowlist explicita para TestBootstrapHelper::assertSafeToRunDestructiveBootstrap()
          # (ver plugins/webkul/support/tests/Helpers/TestBootstrapHelper.php) — este job usa
          # su propio mysql efimero con DB_DATABASE=aureuserp, nunca la base compartida local.
          echo "TEST_BOOTSTRAP_ALLOWED_DATABASES=aureuserp" >> .env

      - name: Download built plugin assets
        uses: actions/download-artifact@v4
        with:
          name: plugin-dist-assets
          path: plugins/webkul

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.4-composer-

      - name: Running Composer Install
        id: composer-install
        shell: bash
        run: |
          set +e
          composer install --no-interaction --prefer-dist --no-progress --no-ansi > composer-install.log 2>&1
          status=$?
          cat composer-install.log
          exit "$status"

      - name: Upload Composer diagnostic
        if: failure() && steps.composer-install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: composer-install-pest-${{ github.run_id }}
          path: composer-install.log
          retention-days: 1

      - name: Running AureusERP Installer
        run: |
          php artisan erp:install \
            --force \
            --admin-name="Example" \
            --admin-email="admin@erp.localhost" \
            --admin-password="Admin123456"

      - name: Running Pest Test (resto de la suite)
        run: vendor/bin/pest --exclude-group=gold-standard-dataset --colors=always

      - name: Running Pest Test (gold-standard-dataset, isolated process)
        run: |
          php artisan inventories:install --no-interaction
          vendor/bin/pest tests/Feature/Console/SeedGoldStandardDatasetCommandTest.php --colors=always

  company_scope_global_audit:
    needs: frontend_assets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    name: Company Scope Global Audit

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aureuserp
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2

      - name: Setting Environment
        shell: bash
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(DB_CONNECTION=\s*\).*$|\1mysql|" .env
          sed -i "s|^#\?\s*DB_HOST=.*|DB_HOST=127.0.0.1|" .env
          sed -i "s|^#\?\s*DB_PORT=.*|DB_PORT=${{ job.services.mysql.ports[3306] }}|" .env
          sed -i "s|^#\?\s*DB_DATABASE=.*|DB_DATABASE=aureuserp|" .env
          sed -i "s|^#\?\s*DB_USERNAME=.*|DB_USERNAME=root|" .env
          sed -i "s|^#\?\s*DB_PASSWORD=.*|DB_PASSWORD=root|" .env
          app_key="base64:$(php -r 'echo base64_encode(random_bytes(32));')"
          sed -i "s|^APP_KEY=.*|APP_KEY=${app_key}|" .env

      - name: Download built plugin assets
        uses: actions/download-artifact@v4
        with:
          name: plugin-dist-assets
          path: plugins/webkul

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.4-composer-

      - name: Running Composer Install
        run: composer install --no-interaction --prefer-dist --no-progress --no-ansi

      # Isolated from the pest_tests job on purpose (#138, PR 4 review) — a
      # full-plugin install sequence seeds a lot more data than the main
      # suite expects, so this runs against its own ephemeral mysql service
      # instead of risking a side effect on the 1577+ existing tests.
      - name: Running AureusERP Installer
        run: |
          php artisan erp:install \
            --force -n \
            --admin-name="Audit Bot" \
            --admin-email="audit-bot@erp.localhost" \
            --admin-password="AuditBot123456"

      - name: Installing every plugin (fresh-install checkpoint, #138)
        run: |
          for plugin in accounting accounts barcode blogs contacts employees full-calendar inventories invoices maintenance manufacturing payments products projects purchases recruitments sales time-off timesheets website; do
            php artisan "${plugin}:install" -n
          done

      - name: Running global company-scope audit
        run: |
          php scripts/audit-company-scope.php --format=json > company-scope-audit.json
          cat company-scope-audit.json
          php -r '
            $data = json_decode(file_get_contents("company-scope-audit.json"), true);
            $summary = $data["summary"];
            $failures = [];
            if ($summary["table_missing"] !== 0) { $failures[] = "table_missing={$summary["table_missing"]}"; }
            if ($summary["inspection_errors"] !== 0) { $failures[] = "inspection_errors={$summary["inspection_errors"]}"; }
            if ($summary["manifest_violations"] !== 0) { $failures[] = "manifest_violations={$summary["manifest_violations"]}"; }
            if ($failures !== []) {
                fwrite(STDERR, "Global audit gate failed: " . implode(", ", $failures) . PHP_EOL);
                exit(1);
            }
            fwrite(STDERR, "Global audit gate passed: {$summary["total"]} models, {$summary["scoped"]} scoped, {$summary["classified_exceptions"]} classified exceptions, " . ($summary["real_gaps_with_company_id"] + $summary["real_gaps_without_company_id"]) . " known real gaps." . PHP_EOL);
          '

      # Exact diff, not a loose count check — the committed inventory is
      # sorted deterministically (plugins alphabetically, rows by
      # plugin+class), uses repo-relative paths, and carries no timestamps,
      # so a byte-for-byte match is the correct bar. Any drift (a model
      # scoped, an exception added/removed, a table renamed) must be
      # committed to docs/security/company-scope-pr4-inventory.json in the
      # SAME change that caused it, not left to silently rot (#138, PR 4 review).
      - name: Comparing generated inventory against the committed snapshot
        run: |
          if ! diff -u docs/security/company-scope-pr4-inventory.json company-scope-audit.json; then
            echo "::error::Generated audit output differs from docs/security/company-scope-pr4-inventory.json. Regenerate it (php scripts/audit-company-scope.php --format=json) and commit the update in the same change that caused the drift." >&2
            exit 1
          fi

      - name: Upload company-scope audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: company-scope-audit-${{ github.run_id }}
          path: company-scope-audit.json
          retention-days: 14
