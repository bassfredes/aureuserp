name: Translations Check

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  translations_check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    name: Check translation files consistency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        id: composer-install
        shell: bash
        run: |
          set +e
          composer install --no-interaction --prefer-dist --no-progress --no-ansi > composer-install.log 2>&1
          status=$?
          cat composer-install.log
          exit "$status"

      - name: Upload Composer diagnostic
        if: failure() && steps.composer-install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: composer-install-translations-${{ github.run_id }}
          path: composer-install.log
          retention-days: 1

      - name: Setting Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run translations consistency check
        run: php artisan translations:check --details
