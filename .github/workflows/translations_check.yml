name: Translations Check

# Temporary manual-CI mode (Intelligent Integration Suite 0.x budget freeze).
# Automatic triggers (push, pull_request, merge_group) are intentionally removed;
# ordinary validation happens locally via the monorepo `make verify-local` gate.
# This runs only on explicit manual dispatch, once per release candidate.
# Restore automatic triggers before v1.0.0.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  translations_check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    name: Check translation files consistency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.4-composer-

      - name: Setting Environment
        shell: bash
        run: |
          cp .env.example .env
          app_key="base64:$(php -r 'echo base64_encode(random_bytes(32));')"
          sed -i "s|^APP_KEY=.*|APP_KEY=${app_key}|" .env

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node.js Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SCSS and Vite assets
        run: pnpm run build

      - name: Install Composer dependencies
        id: composer-install
        shell: bash
        run: |
          set +e
          composer install --no-interaction --prefer-dist --no-progress --no-ansi > composer-install.log 2>&1
          status=$?
          cat composer-install.log
          exit "$status"

      - name: Upload Composer diagnostic
        if: failure() && steps.composer-install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: composer-install-translations-${{ github.run_id }}
          path: composer-install.log
          retention-days: 1

      - name: Run translations consistency check
        run: php artisan translations:check --details
